<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postagens — Klion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="/" class="nav-logo">K<span>lion</span></a>
    <ul class="nav-links">
        <li><a href="/">Início</a></li>
        <li><a href="/sobre.html">Sobre</a></li>
        <li><a href="/postagem.html">Postagens</a></li>
        <li><a href="#" class="btn-sair" onclick="sair()">Sair</a></li>
    </ul>
</nav>

<div class="container">
    <p class="page-subtitle">Gerencie seu conteúdo</p>
    <h1 class="page-title">Postagens</h1>

    <div class="card">
        <h2 style="font-size: 0.95rem; font-weight: 500; color: var(--texto-muted); margin-bottom: 1.25rem; text-transform: uppercase; letter-spacing: 0.8px;">Nova postagem</h2>

        <div id="alerta" class="alert"></div>

        <div class="form-group">
            <label>Título</label>
            <input type="text" id="titulo" placeholder="Digite o título da postagem" autocomplete="off">
        </div>

        <div class="form-group">
            <label>Conteúdo</label>
            <textarea id="conteudo" placeholder="Escreva o conteúdo aqui..." rows="4" style="width: 100%; background: rgba(10,22,40,0.8); border: 1px solid var(--borda); border-radius: 10px; padding: 0.75rem 1rem; color: var(--branco); font-family: 'Sora', sans-serif; font-size: 0.95rem; resize: vertical; outline: none; transition: all 0.2s;"></textarea>
        </div>

        <button class="btn" onclick="criarPostagem()" style="width: auto; padding: 0.75rem 2rem;">Publicar</button>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;">
        <div style="padding: 1.5rem 2rem; border-bottom: 1px solid var(--borda); display: flex; justify-content: space-between; align-items: center;">
            <h2 style="font-size: 0.95rem; font-weight: 500; color: var(--texto-muted); text-transform: uppercase; letter-spacing: 0.8px;">Todas as postagens</h2>
            <span id="total-badge" class="badge">0 posts</span>
        </div>

        <div id="tabela-container">
            <div class="empty-state">
                <p>Nenhuma postagem encontrada.</p>
            </div>
        </div>
    </div>
</div>

<script>
    function verificarLogin(){
        const token = localStorage.getItem("token")
        if(!token) window.location.href = "/login.html"
    }

    function sair(){
        localStorage.removeItem("token")
        window.location.href = "/login.html"
    }

    async function criarPostagem(){
        const titulo = document.getElementById("titulo").value
        const Conteudo = document.getElementById("conteudo").value
        const alerta = document.getElementById("alerta")
        const token = localStorage.getItem("token")

        if(!titulo || !Conteudo){
            alerta.style.display = "block"
            alerta.textContent = "Preencha título e conteúdo!"
            alerta.className = "alert alert-erro"
            return
        }

        const res = await fetch("/postagem", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "authorization": token
            },
            body: JSON.stringify({ titulo, Conteudo })
        })

        const data = await res.json()

        if(data.id){
            alerta.style.display = "block"
            alerta.textContent = "Postagem criada com sucesso!"
            alerta.className = "alert alert-sucesso"
            document.getElementById("titulo").value = ""
            document.getElementById("conteudo").value = ""
            carregarPostagens()
            setTimeout(() => { alerta.style.display = "none" }, 2000)
        } else {
            alerta.style.display = "block"
            alerta.textContent = data.mensagem || "Erro ao criar postagem!"
            alerta.className = "alert alert-erro"
        }
    }

    async function carregarPostagens(){
        const res = await fetch("/postagem")
        const postagens = await res.json()
        const container = document.getElementById("tabela-container")
        const badge = document.getElementById("total-badge")

        badge.textContent = postagens.length + " post" + (postagens.length !== 1 ? "s" : "")

        if(postagens.length === 0){
            container.innerHTML = '<div class="empty-state"><p>Nenhuma postagem encontrada.</p></div>'
            return
        }

        container.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>Título</th>
                        <th>Conteúdo</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody>
                    ${postagens.map(p => `
                        <tr>
                            <td style="color: var(--texto-muted); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;">${p.id}</td>
                            <td style="font-weight: 500;">${p.titulo}</td>
                            <td style="color: var(--texto-muted); max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${p.Conteudo}</td>
                            <td style="color: var(--texto-muted); font-size: 0.8rem; white-space: nowrap;">${new Date(p.createdAt).toLocaleDateString('pt-BR')}</td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        `
    }

    verificarLogin()
    carregarPostagens()
</script>

</body>
</html>
